name: kigali_services
description: Kigali City Services & Places Directory

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── Firebase ──────────────────────────────────────────────────────────
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4


  # ── State Management ──────────────────────────────────────────────────
  provider: ^6.1.1

  # ── Maps & Location ───────────────────────────────────────────────────
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  url_launcher: ^6.2.4          # opens Google Maps navigation

  # ── UI Utilities ──────────────────────────────────────────────────────
  cupertino_icons: ^1.0.2
  flutter_rating_bar: ^4.0.1
  cached_network_image: ^3.3.1
  intl: ^0.18.1                 # date formatting

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true